<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dinner Log</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Vanessa kitchen</p>
          <h1>Dinner Log</h1>
        </div>
        <button class="pick-button" id="pickDinner" type="button">
          <span class="die" aria-hidden="true"></span>
          <span>Pick dinner</span>
        </button>
      </header>

      <section class="dashboard" aria-label="Dinner archive">
        <div class="stats" aria-label="Archive counts">
          <div>
            <strong id="mealCount">0</strong>
            <span>meals</span>
          </div>
          <div>
            <strong id="dishCount">0</strong>
            <span>dishes</span>
          </div>
          <div>
            <strong id="favoriteCount">0</strong>
            <span>saved</span>
          </div>
        </div>

        <div class="controls">
          <label class="search-field">
            <span aria-hidden="true"></span>
            <input id="searchInput" type="search" placeholder="Search dishes, tags, dates">
          </label>
          <div class="filters" id="filters" role="tablist" aria-label="Meal filters"></div>
        </div>
      </section>

      <section class="choice-panel" id="choicePanel" hidden aria-live="polite"></section>

      <section class="meal-grid" id="mealGrid" aria-label="Meals"></section>
      <p class="empty-state" id="emptyState" hidden>No matches right now.</p>
    </main>

    <dialog class="meal-dialog" id="mealDialog">
      <button class="dialog-close" id="dialogClose" type="button" aria-label="Close details">&times;</button>
      <div class="dialog-body" id="dialogBody"></div>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
